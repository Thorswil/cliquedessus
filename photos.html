<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page 6 - Galerie</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Indie Flower', cursive;
      background-color: #e8d8ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding-top: 60px;
      overflow-x: hidden;
      position: relative;
    }

    .heart {
      position: absolute;
      font-size: 24px;
      color: red;
      animation: float 10s infinite ease-in-out;
    }

    .heart1  { animation-delay: 0s; }
    .heart2  { animation-delay: 0.2s; }
    .heart3  { animation-delay: 0.4s; }
    .heart4  { animation-delay: 0.6s; }
    .heart5  { animation-delay: 0.8s; }
    .heart6  { animation-delay: 1s; }
    .heart7  { animation-delay: 1.2s; }
    .heart8  { animation-delay: 1.4s; }
    .heart9  { animation-delay: 1.6s; }
    .heart10 { animation-delay: 1.8s; }
    .heart11 { animation-delay: 2s; }
    .heart12 { animation-delay: 2.2s; }
    .heart13 { animation-delay: 2.4s; }
    .heart14 { animation-delay: 2.6s; }
    .heart15 { animation-delay: 2.8s; }

    @keyframes float {
      0% { transform: translateY(0); opacity: 1; }
      50% { transform: translateY(-20px); opacity: 0.7; }
      100% { transform: translateY(0); opacity: 1; }
    }

    h1 {
      color: #d81b60;
      margin-bottom: 30px;
    }

    .galerie {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      width: 90%;
      max-width: 1000px;
      z-index: 10;
    }

    .galerie img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 15px;
      border: 2px solid #333;
    }
  </style>
</head>
<body>
  <!-- Cœurs décoratifs -->
  <div class="heart heart1" style="top: 5%; left: 10%;">❤️</div>
  <div class="heart heart2" style="top: 10%; left: 80%;">❤️</div>
  <div class="heart heart3" style="top: 20%; left: 50%;">❤️</div>
  <div class="heart heart4" style="top: 25%; left: 30%;">❤️</div>
  <div class="heart heart5" style="top: 30%; left: 70%;">❤️</div>
  <div class="heart heart6" style="top: 35%; left: 15%;">❤️</div>
  <div class="heart heart7" style="top: 40%; left: 90%;">❤️</div>
  <div class="heart heart8" style="top: 45%; left: 40%;">❤️</div>
  <div class="heart heart9" style="top: 55%; left: 20%;">❤️</div>
  <div class="heart heart10" style="top: 60%; left: 60%;">❤️</div>
  <div class="heart heart11" style="top: 65%; left: 75%;">❤️</div>
  <div class="heart heart12" style="top: 70%; left: 35%;">❤️</div>
  <div class="heart heart13" style="top: 80%; left: 5%;">❤️</div>
  <div class="heart heart14" style="top: 85%; left: 50%;">❤️</div>
  <div class="heart heart15" style="top: 90%; left: 85%;">❤️</div>

  <h1>📷 Galerie de souvenirs</h1>
  <div class="galerie">
    <img src="img/photo1.jpg" alt="Souvenir 1">
    <img src="img/photo2.jpg" alt="Souvenir 2">
    <img src="img/photo3.jpg" alt="Souvenir 3">
    <img src="img/photo4.jpg" alt="Souvenir 4">
  </div>

    <br>
    <a href="javascript:history.back()" style="
    margin-top: 30px;
    background-color: #fff;
    padding: 10px 20px;
    border-radius: 10px;
    text-decoration: none;
    color: #333;
    border: 2px solid #333;
    z-index: 10;
    position: relative;
    display: inline-block;
    ">← Retour</a>

</body>
</html>
