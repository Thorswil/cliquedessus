<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentification</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
  
  
</head>
<body>
  <!-- Cœurs décoratifs -->
  <div class="heart heart1" style="top: 5%; left: 10%;">❤️</div>
  <div class="heart heart2" style="top: 10%; left: 80%;">❤️</div>
  <div class="heart heart3" style="top: 20%; left: 50%;">❤️</div>
  <div class="heart heart4" style="top: 25%; left: 30%;">❤️</div>
  <div class="heart heart5" style="top: 30%; left: 70%;">❤️</div>
  <div class="heart heart6" style="top: 35%; left: 15%;">❤️</div>
  <div class="heart heart7" style="top: 40%; left: 90%;">❤️</div>
  <div class="heart heart8" style="top: 45%; left: 40%;">❤️</div>
  <div class="heart heart9" style="top: 55%; left: 20%;">❤️</div>
  <div class="heart heart10" style="top: 60%; left: 60%;">❤️</div>
  <div class="heart heart11" style="top: 65%; left: 75%;">❤️</div>
  <div class="heart heart12" style="top: 70%; left: 35%;">❤️</div>
  <div class="heart heart13" style="top: 80%; left: 5%;">❤️</div>
  <div class="heart heart14" style="top: 85%; left: 50%;">❤️</div>
  <div class="heart heart15" style="top: 90%; left: 85%;">❤️</div>

  <div class="container">
    <div id="dotsDisplay" class="dots"></div>

    <div class="display" id="display">
      <img src="Img/img_chat.jpg" alt="avatar secret">
    </div>

    <div class="keypad">
      <button onclick="appendNumber('1')">1</button>
      <button onclick="appendNumber('2')">2</button>
      <button onclick="appendNumber('3')">3</button>
      <button onclick="appendNumber('4')">4</button>
      <button onclick="appendNumber('5')">5</button>
      <button onclick="appendNumber('6')">6</button>
      <button onclick="appendNumber('7')">7</button>
      <button onclick="appendNumber('8')">8</button>
      <button onclick="appendNumber('9')">9</button>
      <button onclick="clearCode()">.</button>
      <button onclick="appendNumber('0')">0</button>
      <button onclick="validateCode()">✔</button>
    </div>
  </div>

  <div id="result"></div>

  <input type="password" id="codeInput">

  <script src="js/script.js"></script>
</body>
</html>
