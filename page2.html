<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page 2 - Question</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Indie Flower', cursive;
      background-color: #e8d8ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
      text-align: center;
    }

    .heart {
      position: absolute;
      font-size: 24px;
      color: red;
      animation: float 10s infinite ease-in-out;
    }

    .heart1  { animation-delay: 0s; }
    .heart2  { animation-delay: 0.2s; }
    .heart3  { animation-delay: 0.4s; }
    .heart4  { animation-delay: 0.6s; }
    .heart5  { animation-delay: 0.8s; }
    .heart6  { animation-delay: 1s; }
    .heart7  { animation-delay: 1.2s; }
    .heart8  { animation-delay: 1.4s; }
    .heart9  { animation-delay: 1.6s; }
    .heart10 { animation-delay: 1.8s; }
    .heart11 { animation-delay: 2s; }
    .heart12 { animation-delay: 2.2s; }
    .heart13 { animation-delay: 2.4s; }
    .heart14 { animation-delay: 2.6s; }
    .heart15 { animation-delay: 2.8s; }

    @keyframes float {
      0% { transform: translateY(0); opacity: 1; }
      50% { transform: translateY(-20px); opacity: 0.7; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .content {
      background-color: #fff2a8;
      border: 2px solid #333;
      border-radius: 20px;
      padding: 20px 30px;
      display: flex;
      align-items: center;
      gap: 30px;
      z-index: 10;
      width: 100%;
      max-width: none;
      border-left: none;
      border-right: none;
      border-radius: 0;
      box-sizing: border-box;
      justify-content: center;
    }

    .content img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #999;
    }

    .content h2 {
      font-size: 24px;
      margin: 0;
    }

    a {
      margin-top: 40px;
      z-index: 10;
      display: inline-block;
      background-color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      text-decoration: none;
      color: #333;
      border: 2px solid #333;
    }

    a:hover {
      background-color: #f5f5f5;
    }

    .arrow-gif {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100px;
    height: 100px;
    border-radius: 50%; 
    background-color: #fff2a8;
    border: none;
    text-decoration: none;
    margin-top: 20px;
    }

    .arrow-gif img {
        width: 50px;
        height: 50px;
        object-fit: contain;
    }

  </style>
</head>
<body>
  <!-- Cœurs décoratifs -->
  <div class="heart heart1" style="top: 5%; left: 10%;">❤️</div>
  <div class="heart heart2" style="top: 10%; left: 80%;">❤️</div>
  <div class="heart heart3" style="top: 20%; left: 50%;">❤️</div>
  <div class="heart heart4" style="top: 25%; left: 30%;">❤️</div>
  <div class="heart heart5" style="top: 30%; left: 70%;">❤️</div>
  <div class="heart heart6" style="top: 35%; left: 15%;">❤️</div>
  <div class="heart heart7" style="top: 40%; left: 90%;">❤️</div>
  <div class="heart heart8" style="top: 45%; left: 40%;">❤️</div>
  <div class="heart heart9" style="top: 55%; left: 20%;">❤️</div>
  <div class="heart heart10" style="top: 60%; left: 60%;">❤️</div>
  <div class="heart heart11" style="top: 65%; left: 75%;">❤️</div>
  <div class="heart heart12" style="top: 70%; left: 35%;">❤️</div>
  <div class="heart heart13" style="top: 80%; left: 5%;">❤️</div>
  <div class="heart heart14" style="top: 85%; left: 50%;">❤️</div>
  <div class="heart heart15" style="top: 90%; left: 85%;">❤️</div>

  <div class="content">
    <img src="Img/couple.jpg" alt="Illustration">
    <h2>Depuis combien de temps sommes nous ensemble ?</h2>

    <a href="temps.html" class="arrow-gif">
      <img src="Img/icons8-flèche.gif" alt="Galerie">
    </a>
  </div>
  
  <br>
    <a href="javascript:history.back()" style="
    margin-top: 30px;
    background-color: #fff;
    padding: 10px 20px;
    border-radius: 10px;
    text-decoration: none;
    color: #333;
    border: 2px solid #333;
    z-index: 10;
    position: relative;
    display: inline-block;
    ">← Retour</a>

</body>
</html>
